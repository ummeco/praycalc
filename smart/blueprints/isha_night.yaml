blueprint:
  name: "PrayCalc: Night Mode After Isha"
  description: >
    Activates night mode after Isha prayer. Dims all lights to a low, warm level
    and optionally turns off specific devices. Configurable delay after Isha to
    allow time for the prayer itself. Great for winding down before bed.
  domain: automation
  author: PrayCalc
  source_url: https://github.com/ummeco/praycalc/blob/main/smart/blueprints/isha_night.yaml
  input:
    dim_lights:
      name: Lights to dim
      description: Lights to set to low night-mode brightness.
      selector:
        target:
          entity:
            domain: light
    off_lights:
      name: Lights to turn off
      description: Lights to turn off entirely (e.g., kitchen, office).
      default: {}
      selector:
        target:
          entity:
            domain: light
    night_brightness:
      name: Night brightness
      description: Brightness for the dimmed lights (percentage).
      default: 15
      selector:
        number:
          min: 1
          max: 40
          unit_of_measurement: "%"
          mode: slider
    color_temp:
      name: Night color temperature
      description: Warm color temperature for night mode (Kelvin).
      default: 2200
      selector:
        number:
          min: 1800
          max: 3000
          unit_of_measurement: K
          mode: slider
    delay_minutes:
      name: Delay after Isha
      description: Minutes to wait after Isha before activating night mode.
      default: 20
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
          mode: slider
    transition_time:
      name: Transition time
      description: Seconds for the dimming transition.
      default: 30
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: seconds
          mode: slider
    send_notification:
      name: Send notification
      description: Send a mobile notification when night mode activates.
      default: false
      selector:
        boolean:
    notify_service:
      name: Notification service
      description: >
        The notify service entity (e.g., notify.mobile_app_phone).
        Only used if "Send notification" is enabled.
      default: notify.mobile_app
      selector:
        text:

variables:
  send_notif: !input send_notification
  notify_svc: !input notify_service

trigger:
  - platform: time
    at: sensor.praycalc_isha

action:
  - delay:
      minutes: !input delay_minutes
  - service: light.turn_on
    target: !input dim_lights
    data:
      brightness_pct: !input night_brightness
      color_temp_kelvin: !input color_temp
      transition: !input transition_time
  - service: light.turn_off
    target: !input off_lights
    data:
      transition: !input transition_time
  - choose:
      - conditions:
          - "{{ send_notif }}"
        sequence:
          - service: "{{ notify_svc }}"
            data:
              title: "Night Mode Active"
              message: "Isha has passed. Lights dimmed for the night. Rest well."

mode: single
