name: PrayCalc Flutter CI

on:
  push:
    branches: [main]
    paths: ['flutter/**']
  pull_request:
    branches: [main]
    paths: ['flutter/**']

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get dependencies (app)
        working-directory: flutter
        run: flutter pub get
      - name: Get dependencies (pray_calc_dart)
        working-directory: flutter/packages/pray_calc_dart
        run: dart pub get
      - name: Analyze (app)
        working-directory: flutter
        run: flutter analyze
      - name: Analyze (pray_calc_dart)
        working-directory: flutter/packages/pray_calc_dart
        run: dart analyze
      - name: Unit tests — pray_calc_dart
        working-directory: flutter/packages/pray_calc_dart
        run: dart test
      - name: Widget tests — app
        working-directory: flutter
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > flutter/android/app/google-services.json
      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get
      - name: Build App Bundle (release)
        working-directory: flutter
        run: flutter build appbundle --release
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: praycalc-release-${{ github.sha }}
          path: flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  build-ios:
    name: Build iOS (Debug, no code sign)
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Inject GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > flutter/ios/Runner/GoogleService-Info.plist
      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get
      - name: Build iOS (no code sign)
        working-directory: flutter
        run: flutter build ios --no-codesign --debug
      - name: Upload iOS Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: praycalc-ios-debug-${{ github.sha }}
          path: flutter/build/ios/iphonesimulator/Runner.app
          retention-days: 14

  shorebird-patch-android:
    name: Shorebird Patch Android
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Shorebird
        run: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo "$HOME/.shorebird/bin" >> $GITHUB_PATH
      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > flutter/android/app/google-services.json
      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get
      - name: Patch Android
        working-directory: flutter
        run: shorebird patch android
        continue-on-error: true
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  shorebird-patch-ios:
    name: Shorebird Patch iOS
    runs-on: macos-latest
    needs: build-ios
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Shorebird
        run: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo "$HOME/.shorebird/bin" >> $GITHUB_PATH
      - name: Inject GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > flutter/ios/Runner/GoogleService-Info.plist
      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get
      - name: Patch iOS
        working-directory: flutter
        run: shorebird patch ios
        continue-on-error: true
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
